<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>d'Alba 데일리 매출 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --surface:#fcfcfb; --card:#ffffff; --ink:#0b0b0b; --muted:#52514e; --faint:#8a887f;
    --border:#e8e7e2; --grid:#efeeea;
    --s1:#2a78d6; --s2:#1baf7a; --s3:#eda100; --s4:#008300; --s5:#4a3aa7; --s6:#e34948;
    --up:#008300; --down:#e34948;
  }
  @media (prefers-color-scheme: dark){
    :root{ --surface:#1a1a19; --card:#232320; --ink:#ffffff; --muted:#c3c2b7; --faint:#8f8e84;
      --border:#34342f; --grid:#2c2c28; --s1:#3987e5; --s2:#199e70; --s3:#c98500; --s4:#008300; --s5:#9085e9; --s6:#e66767;
      --up:#3ea55a; --down:#e66767; }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--surface);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1180px;margin:0 auto;padding:20px 16px 72px}
  header{display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between;margin-bottom:6px}
  h1{font-size:20px;margin:0;font-weight:750}
  .sub{color:var(--muted);font-size:13px;margin:2px 0 10px}
  input[type=date]{background:var(--card);color:var(--ink);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:13px}
  .sect{margin:30px 0 6px;padding-bottom:8px;border-bottom:2px solid var(--border);display:flex;align-items:baseline;gap:10px}
  .sect h2{font-size:16px;margin:0;font-weight:750}
  .sect .sc{font-size:12px;color:var(--muted)}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 13px}
  .kpi .l{font-size:11.5px;color:var(--muted);margin-bottom:6px}
  .kpi .v{font-size:21px;font-weight:750;letter-spacing:-.3px}
  .kpi .d{font-size:11.5px;margin-top:5px;color:var(--faint);line-height:1.4}
  .up{color:var(--up)} .down{color:var(--down)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  @media (max-width:820px){.grid2,.grid3{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 16px 12px;margin-bottom:14px}
  .card h3{font-size:14px;margin:0 0 2px;font-weight:700}
  .card .cap{font-size:12px;color:var(--muted);margin:0 0 12px}
  .chartbox{position:relative;height:280px}
  .chartbox.tall{height:440px}
  .chartbox.sm{height:230px}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th,td{text-align:right;padding:7px 8px;border-bottom:1px solid var(--grid);white-space:nowrap}
  th:first-child,td:first-child{text-align:left;white-space:normal}
  th{color:var(--muted);font-weight:600;font-size:11.5px}
  tr:last-child td{border-bottom:none}
  .tag{display:inline-block;font-size:11px;padding:1px 6px;border-radius:6px;background:var(--grid);color:var(--muted)}
  .funnel{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;text-align:center}
  .funnel.five{grid-template-columns:repeat(5,1fr)}
  @media (max-width:560px){.funnel.five{grid-template-columns:repeat(3,1fr)}}
  .mlgd b{color:var(--ink);font-weight:700}
  .fstage{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 6px}
  .fstage .fv{font-size:19px;font-weight:750} .fstage .fl{font-size:11.5px;color:var(--muted)} .fstage .fc{font-size:11px;color:var(--s1);margin-top:3px}
  .live{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
  .lcard{border:1px solid var(--border);border-radius:10px;padding:12px;background:var(--surface)}
  .lcard .lt{font-weight:700;font-size:13px} .lcard .lm{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.6}
  .ins{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--s1);border-radius:10px;padding:11px 13px;margin-bottom:8px;font-size:13px;line-height:1.5}
  .ins b{color:var(--s1)}
  .loading{padding:60px;text-align:center;color:var(--muted)}
  .err{padding:20px;border:1px solid var(--down);border-radius:10px;color:var(--down);background:var(--card)}
  .pill{font-size:11px;color:var(--faint)}
  a{color:var(--s1);text-decoration:none} a:hover{text-decoration:underline}
  /* 미니 스택 바 (채널 분해) */
  .mbar{display:flex;height:14px;border-radius:5px;overflow:hidden;gap:2px;background:transparent;margin:6px 0}
  .mbar span{height:100%}
  .mlgd{display:flex;flex-wrap:wrap;gap:10px;font-size:11px;color:var(--muted);margin-top:4px}
  .mlgd i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:4px;vertical-align:middle}
  .badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;margin-left:6px}
  .b-roi{background:rgba(27,175,122,.14);color:var(--s2)}
  .b-warn{background:rgba(237,161,0,.16);color:var(--s3)}
  /* 제품 딥다이브 */
  details.pd{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden}
  details.pd>summary{list-style:none;cursor:pointer;padding:14px 16px;display:flex;align-items:center;gap:12px}
  details.pd>summary::-webkit-details-marker{display:none}
  .prk{font-size:13px;font-weight:750;color:var(--faint);min-width:26px}
  .pnm{font-weight:700;font-size:13.5px;flex:1;min-width:0}
  .pgm{font-weight:750;font-size:14px;white-space:nowrap}
  .pdbody{padding:0 16px 16px;border-top:1px solid var(--grid)}
  .statrow{display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,1fr));gap:8px;margin:14px 0}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:9px 10px}
  .stat .sl{font-size:10.5px;color:var(--muted)} .stat .sv{font-size:15px;font-weight:700;margin-top:3px}
  .subh{font-size:12px;font-weight:700;color:var(--muted);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.4px}
  .chev{transition:transform .15s} details[open] .chev{transform:rotate(90deg)}
  .vlink{font-size:12px}
  .muted{color:var(--muted)}
  /* 이상 신호 */
  .alerts{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px}
  .alert{border:1px solid var(--border);border-left:3px solid var(--faint);border-radius:9px;padding:9px 11px;background:var(--surface);font-size:12.5px}
  .alert.g{border-left-color:var(--up)} .alert.b{border-left-color:var(--down)}
  .alert .am{font-weight:700} .alert .ad{color:var(--muted);font-size:11.5px;margin-top:2px}
  /* 히트맵 */
  .hmwrap{overflow-x:auto}
  .hm{border-collapse:separate;border-spacing:2px;font-size:11px}
  .hm td,.hm th{padding:0;text-align:center}
  .hm th{color:var(--muted);font-weight:600;font-size:10px;padding:2px 3px;white-space:nowrap}
  .hm .rl{text-align:left;color:var(--ink);padding-right:8px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .hm .cell{width:26px;height:22px;border-radius:3px;color:#fff;font-size:9.5px;line-height:22px}
  .flag{display:inline-block;font-size:10.5px;font-weight:700;padding:1px 6px;border-radius:5px;background:rgba(27,175,122,.16);color:var(--s2);margin-left:6px}
  .pins{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--s1);border-radius:9px;padding:11px 13px;margin:12px 0 4px;font-size:12.5px;line-height:1.7}
  .pins b{font-weight:750}
  /* 기간 토글 */
  .seg{display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .seg button{background:var(--card);color:var(--muted);border:none;padding:6px 12px;font-size:12.5px;cursor:pointer;font-family:inherit}
  .seg button.on{background:var(--s1);color:#fff;font-weight:700}
</style>
</head>
<body data-palette="#2a78d6,#1baf7a,#eda100,#008300,#4a3aa7">
<div class="wrap">
  <header>
    <div><h1>📊 d'Alba 데일리 매출 대시보드</h1><div class="sub" id="sub">불러오는 중…</div></div>
    <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
      <nav class="seg" style="text-decoration:none"><a href="/report.html" style="padding:6px 12px;font-size:12.5px;background:var(--s1);color:#fff;font-weight:700;text-decoration:none">매출 리포트</a><a href="/ads.html" style="padding:6px 12px;font-size:12.5px;color:var(--muted);text-decoration:none;background:var(--card)">광고 대시보드</a></nav>
      <div class="seg" id="periodseg"><button data-p="7">최근 1주</button><button data-p="14" class="on">2주</button><button data-p="30">전체</button></div>
      <div><label class="pill">날짜 </label><input type="date" id="datepick"></div>
    </div>
  </header>
  <div id="app"><div class="loading">데이터 불러오는 중…</div></div>
</div>
<script>
const $=s=>document.querySelector(s);
const css=v=>getComputedStyle(document.body).getPropertyValue(v).trim();
const usd=n=>"$"+Math.round(n||0).toLocaleString();
const usdk=v=>"$"+(Math.abs(v)>=1000?(v/1000).toFixed(v>=10000?0:1)+"k":Math.round(v));
const nf=n=>Math.round(n||0).toLocaleString();
const cls=s=>{const t=String(s||"");return t.startsWith("-")?"down":(t.startsWith("+")?"up":"")};
const qs=new URLSearchParams(location.search);
const dateParam=qs.get("date")||"";
Chart.defaults.font.family=getComputedStyle(document.body).fontFamily;
Chart.defaults.animation=false;
let PAL={}, DATA=null, PERIOD=14, CHARTS=[];
// 차트 인스턴스 추적(기간 토글 시 파기 후 재생성)
function NC(el,cfg){ if(!el) return null; const c=new Chart(el,cfg); CHARTS.push(c); return c; }
function resetCharts(){ CHARTS.forEach(c=>{try{c.destroy();}catch(e){}}); CHARTS=[]; }
// 시계열을 최근 PERIOD일로 슬라이스
const slc=a=>Array.isArray(a)?a.slice(-PERIOD):a;

async function load(){
  try{
    const base="/api/daily-report?format=json"+(dateParam?("&date="+encodeURIComponent(dateParam)):"");
    const r=await fetch(base);          // 1차: 데이터만 → 화면 즉시 렌더
    const d=await r.json();
    if(d.error) throw new Error(d.error);
    render(d);
    // 2차: AI 인사이트는 백그라운드 (느린 Claude 호출을 첫 화면에서 분리)
    fetch(base+"&insights=1").then(x=>x.json()).then(x=>{
      if(x&&x.insights){DATA.insights=x.insights;renderInsights(x.insights,false);}
      else renderInsights(null,true);
    }).catch(()=>renderInsights(null,true));
  }catch(e){
    $("#app").innerHTML='<div class="err">불러오기 실패: '+(e.message||e)+'<br>배포/환경변수를 확인하세요.</div>';
    $("#sub").textContent="";
  }
}
function insCard(ins,failed){
  if(ins)return `<div class="card"><h3>💡 AI 인사이트</h3><div class="cap">섹션별 자동 분석</div>
    ${["overview","channel","product","content","funnel","live"].filter(x=>ins[x]).map(x=>`<div class="ins">${esc(ins[x])}</div>`).join("")}</div>`;
  return failed?"":`<div class="card"><h3>💡 AI 인사이트</h3><div class="cap">⏳ 백그라운드에서 생성 중… (화면은 먼저 사용하세요)</div></div>`;
}
function renderInsights(ins,failed){const el=$("#insSlot");if(el)el.innerHTML=insCard(ins,failed);}

function kpi(l,v,d){return `<div class="kpi"><div class="l">${l}</div><div class="v">${v}</div>${d?`<div class="d">${d}</div>`:""}</div>`}
// 순차형 파랑 램프 (순위=진하게) — 구성비 도넛용
function blues(n){const dark=document.documentElement&&matchMedia("(prefers-color-scheme:dark)").matches;
  const out=[];for(let i=0;i<n;i++){const t=n>1?i/(n-1):0;
    const l=dark?(70-t*34):(38+t*36); out.push(`hsl(212 68% ${l}%)`);}return out;}
function sect(icon,t,c){return `<div class="sect"><h2>${icon} ${t}</h2>${c?`<span class="sc">${c}</span>`:""}</div>`}
function esc(s){return String(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
// 미니 스택 바: segs=[{label,v,color}]
function mbar(segs){
  const tot=segs.reduce((s,x)=>s+Math.max(0,x.v),0)||1;
  const bars=segs.filter(s=>s.v>0).map(s=>`<span style="width:${(s.v/tot*100).toFixed(2)}%;background:${s.color}" title="${s.label} ${usd(s.v)}"></span>`).join("");
  const lgd=segs.map(s=>`<span><i style="background:${s.color}"></i>${s.label} ${usd(s.v)} (${(s.v/tot*100).toFixed(0)}%)</span>`).join("");
  return `<div class="mbar">${bars}</div><div class="mlgd">${lgd}</div>`;
}
// 제품별 자동 인사이트 (규칙 기반, 3줄 고정 포맷)
function prodInsight(p){
  const roiTxt=p.roi==null?"광고 미집행":(p.roi>=4?`ROI ${p.roi}x 매우 효율`:p.roi>=3?`ROI ${p.roi}x 양호`:`ROI ${p.roi}x 개선필요`);
  const tot=p.channels.reduce((s,c)=>s+c.v,0)||1;
  const top=[...p.channels].sort((a,b)=>b.v-a.v)[0];
  const std=parseFloat(p.stdRate);
  let diag;
  if(p.refundRate>=10) diag=`⚠️ 환불율 ${p.refundRate}% 높음 — 반품 사유·품질 점검`;
  else if(p.topCreatorShare!=null&&p.topCreatorShare>=60) diag=`⚠️ 매출의 ${p.topCreatorShare}%가 @${esc(p.topCreator||"")} 한 명 — 추가 크리에이터 확보 필요`;
  else if(!isNaN(std)&&std<=20&&(p.roi==null||p.roi>=3)) diag=`💡 표준 커미션 ${p.stdRate}로 낮고 효율 양호 — 커미션 인상해 크리에이터 확대 여지`;
  else if(p.roi!=null&&p.roi>=4) diag=`🚀 광고 효율 우수 — 예산 확대 여지`;
  else if(p.funnel&&p.funnel.orderConv<2) diag=`🔧 주문전환 ${p.funnel.orderConv}% 낮음 — 상세페이지·가격·리뷰 점검`;
  else diag=`✅ 특이 리스크 없음 — 현 기조 유지`;
  return `<div class="pins">
    <div>📊 GMV <b>${usd(p.gmv)}</b> · DoD <span class="${cls(p.dod)}">${p.dod}</span> / WoW <span class="${cls(p.wow)}">${p.wow}</span> · ${roiTxt}${p.adRatio!=null?` · 광고의존도 ${p.adRatio}%`:""}</div>
    <div>🔀 매출의 <b>${(top.v/tot*100).toFixed(0)}%</b>가 ${esc(top.name)} 채널${p.revVideoCount?` · 매출영상 ${p.revVideoCount}건`:""}${p.af?` · 샘플 ${p.af.samples}개→영상 ${p.af.videos}개`:""}</div>
    <div>${diag}</div>
  </div>`;
}

function render(d){
  PAL={S1:css("--s1"),S2:css("--s2"),S3:css("--s3"),S4:css("--s4"),S5:css("--s5"),S6:css("--s6"),
    ink:css("--ink"),muted:css("--muted"),grid:css("--grid"),card:css("--card")};
  const {S1,S2,S3,S4,S5}=PAL;
  $("#sub").innerHTML=`${d.date} 기준 · 전일(${d.prevDay||"–"}) · 전주(${d.prevWeek||"–"}) 대비`;

  const k=d.kpis;
  // ── 1. 전체 스토어 매출 분석 ───────────────────────────
  const kpis=`<div class="kpis">
    ${kpi("총 GMV",usd(k.gmv),`<span class="${cls(k.gmvDoD)}">${k.gmvDoD} DoD</span> · <span class="${cls(k.gmvWoW)}">${k.gmvWoW} WoW</span>`)}
    ${kpi("주문(SKU)",nf(k.orders),`<span class="${cls(k.ordersDoD)}">${k.ordersDoD} DoD</span> · 판매수량 ${nf(k.items)}`)}
    ${kpi("구매자",nf(k.buyers),`<span class="${cls(k.buyersDoD)}">${k.buyersDoD} DoD</span>`)}
    ${kpi("AOV","$"+k.aov.toFixed(2),"주문당 평균")}
    ${kpi("광고비",k.adSpend!=null?usd(k.adSpend):"–",k.adSpend!=null?`<span class="${cls(k.adSpendDoD)}">${k.adSpendDoD} DoD</span> · 제품 ${usd(k.adProduct)} / 라이브 ${usd(k.adLive)}`:"")}
    ${kpi("ROI",k.roi!=null?k.roi.toFixed(2)+"x":"–",k.roiPrev!=null?`전일 ${k.roiPrev}x · GMV÷광고비`:"GMV ÷ 광고비")}
    ${kpi("구매전환율",k.convRate.toFixed(2)+"%",`방문자 ${nf(k.visitors)}`)}
    ${kpi("노출·CTR",nf(k.impressions),`클릭 ${nf(k.clicks)} · CTR ${k.ctr}%`)}
  </div>`;

  const insHtml=`<div id="insSlot">${insCard(d.insights,false)}</div>`;

  const f=d.funnel;
  const funnelHtml=`<div class="card"><h3>🛒 전환 퍼널</h3><div class="cap">단계별 전환율 추이 (%) · CTR · 방문전환 · 장바구니율 · 주문전환 · CVR</div>
    <div class="chartbox"><canvas id="cFunnel"></canvas></div>
    <div class="funnel five" style="margin-top:12px">
      <div class="fstage"><div class="fl">노출</div><div class="fv">${nf(f.impressions)}</div><div class="fc">100%</div></div>
      <div class="fstage"><div class="fl">클릭</div><div class="fv">${nf(f.clicks)}</div><div class="fc">CTR ${f.ctr}%</div></div>
      <div class="fstage"><div class="fl">방문자</div><div class="fv">${nf(f.visitors)}</div><div class="fc">순클릭</div></div>
      <div class="fstage"><div class="fl">장바구니</div><div class="fv">${nf(f.atc)}</div><div class="fc">장바구니율 ${f.atcRate}%</div></div>
      <div class="fstage"><div class="fl">주문</div><div class="fv">${nf(f.orders)}</div><div class="fc">주문전환 ${f.orderConv}%</div></div>
    </div>
    <div class="mlgd" style="margin-top:10px;font-size:11.5px">
      <span>CTR(노출→클릭) <b>${f.ctr}%</b></span>
      <span>CVR(방문→구매) <b>${f.ctor}%</b></span>
      <span>장바구니→주문 <b>${f.atcToOrder}%</b></span>
      <span>구매자 <b>${nf(f.buyers)}</b></span>
    </div></div>`;

  // 이상 신호 + 예측
  const fcHtml=d.forecast?`<div class="alert ${d.forecast.trend==="up"?"g":"b"}"><div class="am">🔮 익일 GMV 예상 ${usd(d.forecast.next)}</div><div class="ad">최근 7일 추세 기반 · 7일 평균 ${usd(d.forecast.ma7)}</div></div>`:"";
  const anoms=(d.anomalies||[]).map(a=>{
    const arrow=a.dir==="up"?"▲":"▼"; const sign=a.change>0?"+":"";
    const val=a.unit==="$"?usd(a.value):(a.unit===""?nf(a.value):a.value+a.unit);

  const headTable=headroom.length?`<div class="card"><h3>💡 커미션 인상 여지</h3><div class="cap">표준 커미션 ≤20% + ROI 양호 → 커미션 올려 크리에이터 더 유치할 여지 <span class="flag">여지</span></div>
    <div style="overflow-x:auto"><table>
    <tr><th>제품</th><th>GMV</th><th>표준 커미션</th><th>광고 커미션</th><th>ROI</th></tr>
    ${headroom.map(h=>`<tr><td>${esc(h.name)}${h.flag?'<span class="flag">여지</span>':""}</td><td>${usd(h.gmv)}</td><td>${h.std||"-"}</td><td>${h.ad||"-"}</td><td>${h.roi!=null?h.roi+"x":"-"}</td></tr>`).join("")}
    </table></div></div>`:"";

  const sec3=sect("📦","제품별 세부 분석",`GMV TOP ${d.products.length}`)+
    `<div class="grid2">
      <div class="card"><h3>🍩 제품별 매출 비중</h3><div class="cap">전체 스토어 GMV 대비 (상위 8 + 기타)</div><div class="chartbox"><canvas id="cProd"></canvas></div></div>
      <div class="card"><h3>🧭 광고 효율 4분면</h3><div class="cap">x=광고비, y=ROI · 우상단=확대, 우하단=개선, 좌상단=효율굿(예산↑ 여지)</div><div class="chartbox"><canvas id="cQuad"></canvas></div></div>
    </div>`+
    heat+
    prodTable+
    headTable+
    `<div class="cap" style="margin:14px 0 8px;font-weight:600">▾ 제품별 상세 (펼쳐보기 — 추이·퍼널·SKU·채널·크리에이터·매출영상)</div>`+
    deep;

  // ── 4. 콘텐츠·크리에이터 분석 (MD/마케터) ──────────────
  let sec4="";
  if(d.content){
    const ct=d.content;
    const orgShop=`<div class="card"><h3>🟢 오가닉 vs 🔵 샵애즈</h3><div class="cap">${ct.date} 기준${ct.lag?" (매출영상 1일 lag)":""} · 콘텐츠 귀속 매출</div>
      ${mbar([{label:"오가닉(스탠다드)",v:ct.org.pay,color:S2},{label:"샵애즈(광고)",v:ct.shop.pay,color:S1}])}
      <div class="statrow" style="margin-top:12px">
        <div class="stat"><div class="sl">오가닉 매출</div><div class="sv">${usd(ct.org.pay)}</div></div>
        <div class="stat"><div class="sl">오가닉 건수</div><div class="sv">${nf(ct.org.cnt)}</div></div>
        <div class="stat"><div class="sl">샵애즈 매출</div><div class="sv">${usd(ct.shop.pay)}</div></div>
        <div class="stat"><div class="sl">샵애즈 건수</div><div class="sv">${nf(ct.shop.cnt)}</div></div>
      </div></div>`;
    const mixCard=`<div class="card"><h3>🎞 콘텐츠 유형별 매출</h3><div class="cap">Video / Livestream / Showcase 등</div><div class="chartbox sm"><canvas id="cMix"></canvas></div></div>`;
    const crHtml=d.creators?`<div class="card"><h3>🎬 크리에이터 효율 (집계)</h3>
      <div class="cap">영상 1건당 ${usd(d.contentPerVideo)} · 라이브 1건당 ${usd(d.contentPerLive)} · 신규 영상 ${nf(d.newVideos)} / 라이브 ${nf(d.newLives)}</div>
      <div class="kpis" style="margin:0">
        ${kpi("게시 크리에이터",nf(d.creators.posted)+"명","")}
        ${kpi("판매발생",nf(d.creators.withSales)+"명",(d.creators.posted?Math.round(d.creators.withSales/d.creators.posted*100):0)+"% 전환")}
        ${kpi("판매발생 영상",d.creators.vidSales+" / "+d.creators.videos,"개")}
        ${kpi("판매발생 라이브",d.creators.liveSales+" / "+d.creators.lives,"개")}
      </div></div>`:"";
    const lead=ct.topCreators&&ct.topCreators.length?`<div class="card"><h3>🏅 크리에이터 매출 리더보드</h3><div class="cap">${ct.date} · 콘텐츠 귀속 매출 상위 ${ct.topCreators.length}명</div>
      <div style="overflow-x:auto"><table>
      <tr><th>#</th><th>크리에이터</th><th>매출</th><th>주문</th><th>콘텐츠</th><th>오가닉</th><th>샵애즈</th></tr>
      ${ct.topCreators.map((c,i)=>`<tr><td>${i+1}</td>
        <td>${c.link?`<a href="${c.link}" target="_blank" rel="noopener">@${esc(c.creator)} ↗</a>`:"@"+esc(c.creator)}</td>
        <td>${usd(c.pay)}</td><td>${c.orders}</td><td>${c.contents}</td>
        <td>${usd(c.org)}</td><td>${usd(c.shop)}</td></tr>`).join("")}
      </table></div></div>`:"";
    sec4=sect("🎬","콘텐츠·크리에이터 분석","MD · 콘텐츠 마케터용")+
      `<div class="grid2">${orgShop}${mixCard}</div>`+crHtml+lead;
  }

  // ── 5. 브랜드 라이브 ───────────────────────────────────
  let sec5="";
  if(d.live && d.live.sessions && d.live.sessions.length){
    const L=d.live;
    const lkpi=`<div class="kpis" style="margin-bottom:14px">
      ${kpi("세션",L.sessions.length+"회",`총 ${(L.minutes/60).toFixed(1)}시간`)}
      ${kpi("라이브 GMV",usd(L.gmv),"")}
      ${kpi("시청자",nf(L.viewers),"누적")}
      ${kpi("주문",nf(L.orders),"")}
      ${kpi("GMV/시간",usd(L.gmv/(L.minutes/60||1)),"시간당 매출")}
    </div>`;
    const charts=`<div class="grid2">
      <div class="card"><h3>💰 세션별 GMV</h3><div class="cap">방송 회차별 (USD)</div><div class="chartbox sm"><canvas id="cLiveGmv"></canvas></div></div>
      <div class="card"><h3>👥 세션별 시청자</h3><div class="cap">방송 회차별 누적 시청자</div><div class="chartbox sm"><canvas id="cLiveEng"></canvas></div></div>
    </div>`;
    const prodChart=L.products&&L.products.length?`<div class="card"><h3>📦 라이브 제품 TOP</h3><div class="cap">Seller LIVE 귀속 GMV</div>
      <div class="chartbox sm"><canvas id="cLiveProd"></canvas></div></div>`:"";
    const detail=`<div class="card"><h3>🔴 세션 상세</h3>
      <div class="live">${L.sessions.map((s,i)=>`<div class="lcard"><div class="lt">세션 ${i+1} · ${s.dur} · ${usd(s.gmv)}</div>
        <div class="lm">${s.ord}주문 · AOV $${Math.round(s.aov)}<br>시청자 ${nf(s.viewers)} · CTR ${s.ctr}<br>결제율 ${s.payrate} · 평균시청 ${s.avgview}분</div></div>`).join("")}</div></div>`;
    sec5=sect("🔴","브랜드 라이브",`${L.sessions.length}세션 · GMV ${usd(L.gmv)}`)+lkpi+charts+prodChart+detail;
  }

  DATA=d;
  $("#app").innerHTML = sec1 + sec2 + secAdv + sec3 + sec4 + sec5;
  // 제품 딥다이브 펼칠 때 해당 제품 차트 지연 렌더
  document.querySelectorAll("details.pd").forEach(el=>{
    el.addEventListener("toggle",()=>{ if(el.open) drawProductCharts(+el.getAttribute("data-rank")); });
  });
  drawCharts(d);
}

function drawCharts(d){
  d={...d,series:slc(d.series)}; // 시계열은 선택 기간(PERIOD)만
  const {S1,S2,S3,S4,S5,S6,ink,muted,grid,card}=PAL;
  const gridCfg={grid:{color:grid},ticks:{color:muted},border:{color:grid}};
  const lgd={labels:{color:ink,boxWidth:12,usePointStyle:true,pointStyle:"rectRounded"}};

  // GMV + 광고비 grouped bars
  NC($("#cTrend"),{type:"bar",data:{labels:d.series.map(s=>s.date),
    datasets:[{label:"GMV",data:d.series.map(s=>s.gmv),backgroundColor:S1,borderRadius:4},
      {label:"광고비",data:d.series.map(s=>s.adSpend),backgroundColor:S3,borderRadius:4}]},
    options:{maintainAspectRatio:false,plugins:{legend:lgd,tooltip:{callbacks:{label:c=>c.dataset.label+": "+usd(c.raw)}}},scales:{x:gridCfg,y:{...gridCfg,ticks:{color:muted,callback:usdk}}}}});
  // ROI line
  NC($("#cRoi"),{type:"line",data:{labels:d.series.map(s=>s.date),
    datasets:[{label:"ROI",data:d.series.map(s=>s.roi),borderColor:S1,backgroundColor:S1,borderWidth:2,tension:.3,pointRadius:2,spanGaps:true}]},
    options:{maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.raw+"x"}}},scales:{x:gridCfg,y:{...gridCfg,ticks:{color:muted,callback:v=>v+"x"}}}}});
  // 주문 + 구매자 grouped bars
  NC($("#cOrders"),{type:"bar",data:{labels:d.series.map(s=>s.date),
    datasets:[{label:"주문(SKU)",data:d.series.map(s=>s.orders),backgroundColor:S1,borderRadius:4},
      {label:"구매자",data:d.series.map(s=>s.buyers),backgroundColor:S2,borderRadius:4}]},
    options:{maintainAspectRatio:false,plugins:{legend:lgd,tooltip:{callbacks:{label:c=>c.dataset.label+": "+nf(c.raw)}}},scales:{x:gridCfg,y:gridCfg}}});
  // AOV line + 구매전환율 line — 둘 다 라인, 스케일 다르므로 서로 다른 y? 규칙상 단일축. 지수화 대신 AOV만 축, 전환율은 별도 표기 회피 → AOV 라인 + 전환율 라인(정규화 없이 각자 값, 하지만 축 하나)
  // 대신 AOV(값), 전환율(값)을 함께 두면 스케일 충돌 → AOV 라인 하나 + 전환율은 툴팁. 단순화: AOV 라인 + 전환율 라인 두개, 전환율은 %라 값이 작음 → 별도 차트가 정석이나 공간상 이중표기 회피 위해 AOV만.
  NC($("#cAov"),{type:"line",data:{labels:d.series.map(s=>s.date),
    datasets:[{label:"AOV($)",data:d.series.map(s=>s.aov),borderColor:S1,backgroundColor:S1,borderWidth:2,tension:.3,pointRadius:2,spanGaps:true},
      {label:"구매전환율(%)",data:d.series.map(s=>s.conv),borderColor:S3,backgroundColor:S3,borderWidth:2,borderDash:[4,3],tension:.3,pointRadius:2,spanGaps:true,hidden:true}]},
    options:{maintainAspectRatio:false,plugins:{legend:lgd,tooltip:{callbacks:{label:c=>c.dataset.label+": "+c.raw}}},scales:{x:gridCfg,y:gridCfg}}});

  // channel donut
  const chCols=[S1,S2,S3,S4,S5];
  NC($("#cChan"),{type:"doughnut",data:{labels:d.channels.map(c=>c.name),
    datasets:[{data:d.channels.map(c=>c.gmv),backgroundColor:d.channels.map((c,i)=>chCols[i%chCols.length]),borderColor:card,borderWidth:2}]},
    options:{maintainAspectRatio:false,cutout:"58%",plugins:{legend:{position:"right",labels:{color:ink,boxWidth:12}},tooltip:{callbacks:{label:c=>c.label+": "+usd(c.raw)+" ("+d.channels[c.dataIndex].share+"%)"}}}}});
  // channel stacked trend (5채널)
  NC($("#cChanTrend"),{type:"bar",data:{labels:d.series.map(s=>s.date),
    datasets:[
      {label:"Affiliate Video",data:d.series.map(s=>s.affVideo),backgroundColor:S1},
      {label:"Affiliate LIVE",data:d.series.map(s=>s.affLive),backgroundColor:S2},
      {label:"Seller Video",data:d.series.map(s=>s.sellerVideo),backgroundColor:S3},
      {label:"Seller LIVE",data:d.series.map(s=>s.sellerLive),backgroundColor:S4},
      {label:"Product Card",data:d.series.map(s=>s.productCard),backgroundColor:S5}
    ]},
    options:{maintainAspectRatio:false,plugins:{legend:lgd,tooltip:{callbacks:{label:c=>c.dataset.label+": "+usd(c.raw)}}},scales:{x:{...gridCfg,stacked:true},y:{...gridCfg,stacked:true,ticks:{color:muted,callback:usdk}}}}});

  // product 도넛 — 전체 매출 대비 각 제품 비중 (상위 + 기타)
  const N=8, tops=d.products.slice(0,N);
  const sumTops=tops.reduce((s,p)=>s+p.gmv,0);
  const others=Math.max(0,(d.kpis.gmv||0)-sumTops);
  const dLabels=tops.map(p=>p.name.length>28?p.name.slice(0,26)+"…":p.name).concat(others>0?["기타(그 외 전체)"]:[]);
  const dData=tops.map(p=>p.gmv).concat(others>0?[others]:[]);
  const ramp=blues(tops.length).concat(others>0?[css("--faint")]:[]);
  const total=d.kpis.gmv||dData.reduce((s,x)=>s+x,0);
  NC($("#cProd"),{type:"doughnut",data:{labels:dLabels,
    datasets:[{data:dData,backgroundColor:ramp,borderColor:card,borderWidth:2}]},
    options:{maintainAspectRatio:false,cutout:"56%",plugins:{legend:{position:"right",labels:{color:ink,boxWidth:12,font:{size:11}}},
      tooltip:{callbacks:{label:c=>c.label+": "+usd(c.raw)+" ("+(c.raw/total*100).toFixed(1)+"%)"}}}}});

  // content-type mix
  if(d.content && d.content.mix && d.content.mix.length){
    NC($("#cMix"),{type:"bar",data:{labels:d.content.mix.map(m=>m.type),
      datasets:[{label:"매출",data:d.content.mix.map(m=>m.pay),backgroundColor:d.content.mix.map((m,i)=>chCols[i%chCols.length]),borderRadius:4}]},
      options:{indexAxis:"y",maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>usd(c.raw)}}},scales:{x:{...gridCfg,ticks:{color:muted,callback:usdk}},y:{grid:{display:false},ticks:{color:ink}}}}});
  }

  // 오가닉 vs 샵애즈 매출 추이 (누적 영역)
  if($("#cOrgShop")) NC($("#cOrgShop"),{type:"line",data:{labels:d.series.map(s=>s.date),
    datasets:[{label:"오가닉(스탠다드)",data:d.series.map(s=>s.org),backgroundColor:S2+"55",borderColor:S2,borderWidth:2,fill:true,tension:.3,pointRadius:0,spanGaps:true},
      {label:"샵애즈(광고)",data:d.series.map(s=>s.shop),backgroundColor:S1+"55",borderColor:S1,borderWidth:2,fill:true,tension:.3,pointRadius:0,spanGaps:true}]},
    options:{maintainAspectRatio:false,plugins:{legend:lgd,tooltip:{callbacks:{label:c=>c.dataset.label+": "+usd(c.raw)}}},scales:{x:gridCfg,y:{...gridCfg,stacked:true,ticks:{color:muted,callback:usdk}}}}});
  // 오가닉 스토어탭 GMV 추이
  if($("#cShopTab")) NC($("#cShopTab"),{type:"line",data:{labels:d.series.map(s=>s.date),
    datasets:[{label:"Shop tab GMV",data:d.series.map(s=>s.shopGmv),borderColor:S2,backgroundColor:S2+"33",borderWidth:2,fill:true,tension:.3,pointRadius:0,spanGaps:true}]},
    options:{maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>usd(c.raw)}}},scales:{x:gridCfg,y:{...gridCfg,ticks:{color:muted,callback:usdk}}}}});
  // 주차별 매출
  if($("#cWeekly")&&d.weekly) NC($("#cWeekly"),{type:"bar",data:{labels:d.weekly.map(w=>w.label),
    datasets:[{label:"GMV",data:d.weekly.map(w=>w.gmv),backgroundColor:S1,borderRadius:4},{label:"광고비",data:d.weekly.map(w=>w.spend),backgroundColor:S3,borderRadius:4}]},
    options:{maintainAspectRatio:false,plugins:{legend:lgd,tooltip:{callbacks:{label:c=>c.dataset.label+": "+usd(c.raw)}}},scales:{x:gridCfg,y:{...gridCfg,ticks:{color:muted,callback:usdk}}}}});

  // 파레토 곡선
  if($("#cPareto")&&d.pareto) NC($("#cPareto"),{data:{labels:d.pareto.points.map(p=>p.rank),
    datasets:[{type:"line",label:"누적 매출 비중",data:d.pareto.points.map(p=>p.cum),borderColor:S1,backgroundColor:S1,borderWidth:2,tension:.2,pointRadius:0,yAxisID:"y"}]},
    options:{maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{title:c=>d.pareto.points[c[0].dataIndex].name.slice(0,40),label:c=>"누적 "+c.raw+"% (제품 "+(c.dataIndex+1)+"개)"}}},scales:{x:{...gridCfg,title:{display:true,text:"제품 순위",color:muted}},y:{...gridCfg,max:100,ticks:{color:muted,callback:v=>v+"%"}}}}});
  // 워터폴 (전일 대비 제품 기여)
  if($("#cWaterfall")&&d.waterfall) NC($("#cWaterfall"),{type:"bar",data:{labels:d.waterfall.items.map(x=>x.name.length>18?x.name.slice(0,16)+"…":x.name),
    datasets:[{label:"기여",data:d.waterfall.items.map(x=>x.delta),backgroundColor:d.waterfall.items.map(x=>x.delta>=0?S2:(S6||S4)),borderRadius:3}]},
    options:{indexAxis:"y",maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{title:c=>d.waterfall.items[c[0].dataIndex].name,label:c=>(c.raw>=0?"+":"")+usd(c.raw)}}},scales:{x:{...gridCfg,ticks:{color:muted,callback:usdk}},y:{grid:{display:false},ticks:{color:ink,font:{size:10}}}}}});
  // 퍼널 WoW
  if($("#cFunnelWoW")&&d.funnelWoW){const F=d.funnelWoW;const ds=[{label:"이번",data:F.thisW,backgroundColor:S1,borderRadius:4}];if(F.lastW)ds.push({label:"전주",data:F.lastW,backgroundColor:S3,borderRadius:4});
    NC($("#cFunnelWoW"),{type:"bar",data:{labels:F.stages,datasets:ds},
    options:{maintainAspectRatio:false,plugins:{legend:lgd,tooltip:{callbacks:{label:c=>c.dataset.label+": "+c.raw+"%"}}},scales:{x:gridCfg,y:{...gridCfg,ticks:{color:muted,callback:v=>v+"%"}}}}});}
  // CTR vs CVR 버블 — 색: 주문전환 중앙값 기준 상(초록)/하(주황)
  if($("#cScatter")){const mi=Math.max(1,...d.products.map(p=>p.funnel.imp));
    const convs=d.products.map(p=>p.funnel.orderConv).sort((a,b)=>a-b);const med=convs[Math.floor(convs.length/2)]||0;
    const pt=p=>({x:p.funnel.ctr,y:p.funnel.orderConv,r:7+Math.sqrt(p.funnel.imp/mi)*20,n:p.name});
    NC($("#cScatter"),{type:"bubble",data:{datasets:[
      {label:"전환 양호",data:d.products.filter(p=>p.funnel.orderConv>=med).map(pt),backgroundColor:S2+"cc",borderColor:card,borderWidth:1.5},
      {label:"전환 개선대상",data:d.products.filter(p=>p.funnel.orderConv<med).map(pt),backgroundColor:S3+"cc",borderColor:card,borderWidth:1.5}]},
    options:{maintainAspectRatio:false,plugins:{legend:lgd,tooltip:{callbacks:{label:c=>c.raw.n.slice(0,30)+" · CTR "+c.raw.x+"% / 주문전환 "+c.raw.y+"%"}}},scales:{x:{...gridCfg,title:{display:true,text:"CTR %",color:muted},ticks:{color:muted,callback:v=>v+"%"}},y:{...gridCfg,title:{display:true,text:"주문전환 %",color:muted},ticks:{color:muted,callback:v=>v+"%"}}}}});}
  // 신규 콘텐츠 vs 매출 산점
  if($("#cContentGmv")) NC($("#cContentGmv"),{type:"scatter",data:{datasets:[{label:"일자",data:d.series.map(s=>({x:s.newVid,y:s.gmv})),backgroundColor:S1+"cc"}]},
    options:{maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>"신규영상 "+c.raw.x+"개 · GMV "+usd(c.raw.y)}}},scales:{x:{...gridCfg,title:{display:true,text:"신규 영상 수",color:muted}},y:{...gridCfg,ticks:{color:muted,callback:usdk}}}}});
  // 환불율 추이
  if($("#cRefund")) NC($("#cRefund"),{type:"line",data:{labels:d.series.map(s=>s.date),
    datasets:[{label:"환불율",data:d.series.map(s=>s.refundRate),borderColor:S6||S4,backgroundColor:(S6||S4)+"33",borderWidth:2,fill:true,tension:.3,pointRadius:2,spanGaps:true}]},
    options:{maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.raw+"% · "+usd(d.series[c.dataIndex].refund)}}},scales:{x:gridCfg,y:{...gridCfg,ticks:{color:muted,callback:v=>v+"%"}}}}});
  // 광고효율 4분면
  if($("#cQuad")){const pts=d.products.filter(p=>p.cost!=null&&p.roi!=null);
    NC($("#cQuad"),{type:"bubble",data:{datasets:[
      {label:"ROI≥3",data:pts.filter(p=>p.roi>=3).map(p=>({x:p.cost,y:p.roi,r:8+Math.sqrt(p.gmv/(d.kpis.gmv||1))*22,n:p.name})),backgroundColor:S2+"cc"},
      {label:"ROI<3",data:pts.filter(p=>p.roi<3).map(p=>({x:p.cost,y:p.roi,r:8+Math.sqrt(p.gmv/(d.kpis.gmv||1))*22,n:p.name})),backgroundColor:(S6||S3)+"cc"}]},
    options:{maintainAspectRatio:false,plugins:{legend:lgd,tooltip:{callbacks:{label:c=>c.raw.n.slice(0,30)+" · 광고비 "+usd(c.raw.x)+" / ROI "+c.raw.y+"x"}}},scales:{x:{...gridCfg,title:{display:true,text:"광고비 $",color:muted},ticks:{color:muted,callback:usdk}},y:{...gridCfg,title:{display:true,text:"ROI",color:muted},ticks:{color:muted,callback:v=>v+"x"}}}}});}

  // store funnel — 전환율 추이 (여러 선)
  drawRateTrend("cFunnel",d.series.map(s=>s.date),[
    {label:"CTR",data:d.series.map(s=>s.ctr),color:S1},
    {label:"장바구니율",data:d.series.map(s=>s.atcRate),color:S3},
    {label:"주문전환",data:d.series.map(s=>s.orderConv),color:S4},
    {label:"CVR(방문→구매)",data:d.series.map(s=>s.conv),color:S5}
  ]);

  // brand live charts
  if(d.live && d.live.sessions && d.live.sessions.length){
    const L=d.live, labs=L.sessions.map((s,i)=>"세션 "+(i+1));
    NC($("#cLiveGmv"),{type:"bar",data:{labels:labs,
      datasets:[{label:"GMV",data:L.sessions.map(s=>Math.round(s.gmv)),backgroundColor:S6||S1,borderRadius:4}]},
      options:{maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>usd(c.raw)+" · "+L.sessions[c.dataIndex].dur}}},scales:{x:gridCfg,y:{...gridCfg,ticks:{color:muted,callback:usdk}}}}});
    NC($("#cLiveEng"),{type:"bar",data:{labels:labs,
      datasets:[{label:"시청자",data:L.sessions.map(s=>s.viewers),backgroundColor:S1,borderRadius:4}]},
      options:{maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>"시청자 "+nf(c.raw)+" · 주문 "+nf(L.sessions[c.dataIndex].ord)}}},scales:{x:gridCfg,y:gridCfg}}});
    if(L.products && L.products.length)
      NC($("#cLiveProd"),{type:"bar",data:{labels:L.products.map(p=>p.name.length>34?p.name.slice(0,32)+"…":p.name),
        datasets:[{label:"Seller LIVE GMV",data:L.products.map(p=>Math.round(p.sl)),backgroundColor:S4,borderRadius:4}]},
        options:{indexAxis:"y",maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>usd(c.raw)}}},scales:{x:{...gridCfg,ticks:{color:muted,callback:usdk}},y:{grid:{display:false},ticks:{color:ink,font:{size:11}}}}}});
  }

  // 펼쳐진 제품(첫 항목) 차트 즉시 렌더 + 펼칠 때마다 지연 렌더
  drawOpenProducts();
}

// 전환율 추이 다중 라인 (범용: store/product 공용)
function drawRateTrend(id, labels, lines){
  const el=$("#"+id); if(!el) return;
  const {muted,grid,ink}=PAL;
  NC(el,{type:"line",data:{labels,
    datasets:lines.map(l=>({label:l.label,data:l.data,borderColor:l.color,backgroundColor:l.color,borderWidth:2,tension:.3,pointRadius:2,spanGaps:true}))},
    options:{maintainAspectRatio:false,
      plugins:{legend:{labels:{color:ink,boxWidth:12,usePointStyle:true,pointStyle:"line"}},tooltip:{callbacks:{label:c=>c.dataset.label+": "+(c.raw==null?"-":c.raw+"%")}}},
      scales:{x:{grid:{color:grid},border:{color:grid},ticks:{color:muted}},y:{grid:{color:grid},border:{color:grid},ticks:{color:muted,callback:v=>v+"%"}}}}});
}

// 제품 딥다이브 차트 (지연 렌더) — data-drawn 플래그로 1회만
const drawnProd={};
function drawProductCharts(rank){
  if(drawnProd[rank]) return; drawnProd[rank]=true;
  const p=(DATA.products||[]).find(x=>x.rank===rank); if(!p||!p.series) return;
  const {S1,S2,S3,S4,S5,S6,muted,grid,ink}=PAL;
  const gridCfg={grid:{color:grid},ticks:{color:muted},border:{color:grid}};
  const lgd={labels:{color:ink,boxWidth:12,usePointStyle:true,pointStyle:"rectRounded"}};
  const ser=slc(p.series), labs=ser.map(s=>s.date);
  // GMV + 광고비
  if($("#ptr"+rank)) NC($("#ptr"+rank),{type:"bar",data:{labels:labs,
    datasets:[{label:"GMV",data:ser.map(s=>s.gmv),backgroundColor:S1,borderRadius:3},
      {label:"광고비",data:ser.map(s=>s.cost),backgroundColor:S3,borderRadius:3}]},
    options:{maintainAspectRatio:false,plugins:{legend:lgd,tooltip:{callbacks:{label:c=>c.dataset.label+": "+usd(c.raw)}}},scales:{x:gridCfg,y:{...gridCfg,ticks:{color:muted,callback:usdk}}}}});
  // ROI 추이 (단일축) — 툴팁에 주문수 병기
  if($("#por"+rank)) NC($("#por"+rank),{type:"line",data:{labels:labs,
    datasets:[{label:"ROI",data:ser.map(s=>s.roi),borderColor:S1,backgroundColor:S1,borderWidth:2,tension:.3,pointRadius:2,spanGaps:true}]},
    options:{maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>"ROI "+(c.raw==null?"-":c.raw+"x")+" · 주문 "+nf(ser[c.dataIndex].orders)}}},
      scales:{x:gridCfg,y:{...gridCfg,ticks:{color:muted,callback:v=>v+"x"}}}}});
  // 퍼널 물량 추이 — 클릭·장바구니·주문 (건수)
  if($("#pvol"+rank)) NC($("#pvol"+rank),{type:"line",data:{labels:labs,
    datasets:[{label:"클릭",data:ser.map(s=>s.clk),borderColor:S1,backgroundColor:S1,borderWidth:2,tension:.3,pointRadius:1,spanGaps:true},
      {label:"장바구니",data:ser.map(s=>s.atc),borderColor:S3,backgroundColor:S3,borderWidth:2,tension:.3,pointRadius:1,spanGaps:true},
      {label:"주문",data:ser.map(s=>s.orders),borderColor:S2,backgroundColor:S2,borderWidth:2,tension:.3,pointRadius:1,spanGaps:true}]},
    options:{maintainAspectRatio:false,plugins:{legend:lgd,tooltip:{callbacks:{label:c=>c.dataset.label+": "+nf(c.raw)}}},scales:{x:gridCfg,y:gridCfg}}});
  // 전환율 추이 (여러 선)
  const rate=(a,b)=>b?+(a/b*100).toFixed(2):null;
  drawRateTrend("pfn"+rank,labs,[
    {label:"CTR",data:ser.map(s=>rate(s.clk,s.imp)),color:S1},
    {label:"장바구니율",data:ser.map(s=>rate(s.atc,s.clk)),color:S3},
    {label:"주문전환",data:ser.map(s=>rate(s.orders,s.atc)),color:S2}
  ]);
  // 오가닉 vs 샵애즈 매출 추이 (누적 영역)
  if($("#pos"+rank)) NC($("#pos"+rank),{type:"line",data:{labels:labs,
    datasets:[{label:"오가닉",data:ser.map(s=>s.org),backgroundColor:S2+"55",borderColor:S2,borderWidth:2,fill:true,tension:.3,pointRadius:0,spanGaps:true},
      {label:"샵애즈",data:ser.map(s=>s.shop),backgroundColor:S1+"55",borderColor:S1,borderWidth:2,fill:true,tension:.3,pointRadius:0,spanGaps:true}]},
    options:{maintainAspectRatio:false,plugins:{legend:lgd,tooltip:{callbacks:{label:c=>c.dataset.label+": "+usd(c.raw)}}},scales:{x:gridCfg,y:{...gridCfg,stacked:true,ticks:{color:muted,callback:usdk}}}}});
  // 샘플 발송 · 신규 영상 추이 (건수)
  if($("#psv"+rank)) NC($("#psv"+rank),{type:"bar",data:{labels:labs,
    datasets:[{label:"신규 영상",data:ser.map(s=>s.newVid),backgroundColor:S1,borderRadius:3},
      {label:"샘플 발송",data:ser.map(s=>s.samples),backgroundColor:S3,borderRadius:3}]},
    options:{maintainAspectRatio:false,plugins:{legend:lgd,tooltip:{callbacks:{label:c=>c.dataset.label+": "+nf(c.raw)+"건"}}},scales:{x:gridCfg,y:gridCfg}}});
}
function drawOpenProducts(){
  document.querySelectorAll("details.pd[open]").forEach(el=>drawProductCharts(+el.getAttribute("data-rank")));
}

$("#datepick").addEventListener("change",e=>{
  const v=e.target.value; const u=new URL(location.href);
  if(v)u.searchParams.set("date",v); else u.searchParams.delete("date");
  location.href=u.toString();
});
// 기간 토글 (7/14/30일) — 시계열 차트만 파기 후 재생성
$("#periodseg").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b||!DATA) return;
  PERIOD=+b.getAttribute("data-p");
  [...$("#periodseg").children].forEach(x=>x.classList.toggle("on",x===b));
  resetCharts(); Object.keys(drawnProd).forEach(k=>delete drawnProd[k]); drawCharts(DATA);
});
if(dateParam)$("#datepick").value=dateParam;
load();
</script>
</body>
</html>
