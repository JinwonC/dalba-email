<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>이메일 회신 트래커 (라이브)</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic",sans-serif; background:#f7f7f5; color:#1d1d1f; font-size:14px; }
  .wrap { padding:20px 18px 48px; max-width:1180px; margin:0 auto; }
  .top { display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:8px; }
  h1 { font-size:20px; margin:0; font-weight:680; }
  .sub { color:#6b6b6b; font-size:12.5px; }
  button.reload { border:1px solid #d8d8d4; background:#fff; border-radius:8px; padding:6px 12px; cursor:pointer; font-size:12.5px; }
  .stats { display:flex; gap:12px; margin:14px 0; flex-wrap:wrap; }
  .stat { background:#fff; border:1px solid #ececec; border-radius:12px; padding:10px 16px; min-width:110px; }
  .stat .n { font-size:23px; font-weight:750; }
  .stat .l { font-size:11.5px; color:#888; margin-top:2px; }
  table { width:100%; border-collapse:collapse; background:#fff; border:1px solid #ececec; border-radius:12px; overflow:hidden; }
  th,td { text-align:left; padding:11px 12px; vertical-align:top; border-bottom:1px solid #f0f0ee; }
  th { font-size:11.5px; color:#888; font-weight:600; text-transform:uppercase; letter-spacing:.03em; background:#fafafa; }
  tr:last-child td { border-bottom:none; }
  tr td { background:#fffaf6; }
  td.date { white-space:nowrap; color:#777; font-size:12px; }
  .rep,.creator { font-weight:600; }
  .summary { color:#444; font-size:12.5px; line-height:1.5; max-width:480px; }
  a.open { color:#1a73e8; text-decoration:none; font-size:12px; white-space:nowrap; }
  .msg { text-align:center; padding:48px; color:#999; }
  .err { background:#fff3f2; border:1px solid #f3c4bf; color:#b3322a; padding:12px 14px; border-radius:10px; margin:12px 0; font-size:13px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <h1>📩 이메일 회신 트래커 <span style="font-size:12px;color:#2e7d32;font-weight:600">● LIVE</span></h1>
      <div class="sub">크리에이터가 보내 <b>우리 차례</b>인 메일 — Gmail 실시간 연동</div>
    </div>
    <div style="text-align:right">
      <button class="reload" onclick="load()">새로고침</button>
      <div class="sub" id="updated"></div>
    </div>
  </div>

  <div class="stats" id="stats"></div>
  <div id="content"><div class="msg">불러오는 중…</div></div>
</div>

<script>
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
async function load(){
  document.getElementById("content").innerHTML = '<div class="msg">불러오는 중…</div>';
  try {
    const r = await fetch('/api/threads', { cache:'no-store' });
    const data = await r.json();
    if(data.error) throw new Error(data.error);
    render(data);
  } catch(e){
    document.getElementById("content").innerHTML =
      '<div class="err">불러오지 못했습니다: '+esc(String(e.message||e))+'</div>';
  }
}
function render(data){
  const rows = data.rows || [];
  document.getElementById("updated").textContent =
    '업데이트 ' + new Date(data.updated).toLocaleString('ko-KR');
  document.getElementById("stats").innerHTML =
    '<div class="stat"><div class="n" style="color:#c0392b">'+rows.length+'</div><div class="l">회신 필요</div></div>';
  if(!rows.length){
    document.getElementById("content").innerHTML='<div class="msg">✅ 현재 회신 대기 중인 크리에이터 메일이 없습니다.</div>';
    return;
  }
  const head='<tr><th>날짜</th><th>담당자</th><th>크리에이터</th><th>요약</th><th></th></tr>';
  const body=rows.map(r=>'<tr>'+
    '<td class="date">'+esc(r.date)+'</td>'+
    '<td class="rep">'+esc(r.rep)+'</td>'+
    '<td class="creator">'+esc(r.creator)+'</td>'+
    '<td class="summary">'+esc(r.summary)+'</td>'+
    '<td><a class="open" href="'+esc(r.link)+'" target="_blank" rel="noopener">열기 ↗</a></td>'+
    '</tr>').join("");
  document.getElementById("content").innerHTML='<table><thead>'+head+'</thead><tbody>'+body+'</tbody></table>';
}
load();
</script>
</body>
</html>
